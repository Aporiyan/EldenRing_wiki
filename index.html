<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>艾尔登法环 中文维基</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚔</text></svg>">
  <link rel="stylesheet" href="/src/styles/main.css">
</head>
<body>
  <div id="app">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">ELDEN RING</div>
        <div class="sidebar-subtitle">知识库</div>
      </div>
      <nav class="sidebar-nav">
        <a href="#/" class="nav-item" data-route="/">
          <span class="nav-icon">⌂</span>
          <span class="nav-label">首页</span>
        </a>
        <div class="nav-group">
          <div class="nav-group-title">装备</div>
          <a href="#/weapons" class="nav-item" data-route="/weapons">
            <span class="nav-icon">⚔</span>
            <span class="nav-label">武器</span>
          </a>
          <a href="#/armor-sets" class="nav-item" data-route="/armor-sets">
            <span class="nav-icon">🛡</span>
            <span class="nav-label">防具套装</span>
          </a>
          <a href="#/armor" class="nav-item" data-route="/armor">
            <span class="nav-icon">🛡</span>
            <span class="nav-label">防具（散件）</span>
          </a>
          <a href="#/talismans" class="nav-item" data-route="/talismans">
            <span class="nav-icon">◇</span>
            <span class="nav-label">护符</span>
          </a>
        </div>
        <div class="nav-group">
          <div class="nav-group-title">能力</div>
          <a href="#/spells" class="nav-item" data-route="/spells">
            <span class="nav-icon">✦</span>
            <span class="nav-label">魔法 & 祷告</span>
          </a>
          <a href="#/ashes" class="nav-item" data-route="/ashes">
            <span class="nav-icon">🔥</span>
            <span class="nav-label">战灰</span>
          </a>
          <a href="#/spirits" class="nav-item" data-route="/spirits">
            <span class="nav-icon">👻</span>
            <span class="nav-label">骨灰</span>
          </a>
        </div>
        <div class="nav-group">
          <div class="nav-group-title">道具</div>
          <a href="#/items" class="nav-item" data-route="/items">
            <span class="nav-icon">◆</span>
            <span class="nav-label">道具 & 材料</span>
          </a>
        </div>
        <a href="#/map" class="nav-item" data-route="/map">
          <span class="nav-icon">🗺</span>
          <span class="nav-label">活点地图</span>
        </a>
        <div class="nav-group">
          <div class="nav-group-title">工具</div>
          <a href="#/build-planner" class="nav-item" data-route="/build-planner">
            <span class="nav-icon">🔨</span>
            <span class="nav-label">Build 配装器</span>
          </a>
          <a href="#/upgrade-calc" class="nav-item" data-route="/upgrade-calc">
            <span class="nav-icon">⬆</span>
            <span class="nav-label">强化计算</span>
          </a>
          <a href="#/item-compare" class="nav-item" data-route="/item-compare">
            <span class="nav-icon">⇄</span>
            <span class="nav-label">物品对比</span>
          </a>
        </div>
        <div class="nav-group">
          <div class="nav-group-title">百科</div>
          <a href="#/npcs" class="nav-item" data-route="/npcs">
            <span class="nav-icon">👤</span>
            <span class="nav-label">NPC</span>
          </a>
          <a href="#/info" class="nav-item" data-route="/info">
            <span class="nav-icon">📜</span>
            <span class="nav-label">信息/信件</span>
          </a>
        </div>
      </nav>
      <div class="theme-switcher">
        <div class="theme-switcher-label">主题</div>
        <div class="theme-options">
          <button class="theme-btn" data-theme="elden-ring" title="Elden Ring 原生主题">
            <span class="theme-dot" style="background:#0a0a0f;border-color:#c9a84c"></span>
            <span>原生</span>
          </button>
          <button class="theme-btn" data-theme="white" title="白色主题">
            <span class="theme-dot" style="background:#f2f0ea;border-color:#b89a3a"></span>
            <span>白色</span>
          </button>
          <button class="theme-btn" data-theme="lavender" title="淡紫色主题">
            <span class="theme-dot" style="background:#eeeaf5;border-color:#a890c9"></span>
            <span>淡紫</span>
          </button>
        </div>
      </div>
    </aside>
    <main class="main-content" id="main-content">
      <header class="topbar">
        <button class="sidebar-toggle" id="sidebar-toggle">☰</button>
        <div class="search-box">
          <span class="search-icon">🔍</span>
          <input type="text" class="search-input" id="global-search" placeholder="搜索武器、防具、魔法..." autocomplete="off">
        </div>
      </header>
      <div class="content-area" id="content-area">
        <div class="loading-screen">
          <div class="loading-ring"></div>
          <div class="loading-text">加载知识库...</div>
        </div>
      </div>
    </main>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
